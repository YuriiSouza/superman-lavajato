version: '3.9'

services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lavajato-network

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    networks:
      - lavajato-network

  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lavajato}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lavajato-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lavajato-network

volumes:
  pgdata:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:

networks:
  lavajato-network:
    driver: bridge
